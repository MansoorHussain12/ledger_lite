kind = "web"
previewPath = "/"
title = "AL-RAHMAN TRADERS Ledger"
version = "1.0.0"
id = "artifacts/ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21356

[services.development]
run = "pnpm --filter @workspace/ledger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ledger", "run", "build" ]
publicDir = "artifacts/ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21356"
BASE_PATH = "/"
