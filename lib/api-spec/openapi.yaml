openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AL-RAHMAN TRADERS Ledger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: customers
    description: Customer management
  - name: products
    description: Product/inventory management
  - name: saleOrders
    description: Sale orders & invoices
  - name: payments
    description: Payments & receipts
  - name: reports
    description: Business reports
  - name: dashboard
    description: Dashboard summary
  - name: suppliers
    description: Suppliers & purchase invoices
  - name: cashbook
    description: Cashbook & expenses

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (owner only)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a new user (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [auth]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CUSTOMERS ─────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: area
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{id}/ledger:
    get:
      operationId: getCustomerLedger
      tags: [customers]
      summary: Get a customer's detailed ledger with running balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerLedger"

  /customers/{id}/statement:
    get:
      operationId: getCustomerStatement
      tags: [customers]
      summary: Get WhatsApp-ready plain text statement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plain text statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStatement"

  # ── PRODUCTS ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products/cement brands
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (also logs new rate to rate history)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/rates:
    get:
      operationId: getProductRates
      tags: [products]
      summary: Get rate history for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rate history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductRate"

  # ── SALE ORDERS ───────────────────────────────────────────────────────────
  /sale-orders:
    get:
      operationId: listSaleOrders
      tags: [saleOrders]
      summary: List all sale orders
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sale order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleOrder"
    post:
      operationId: createSaleOrder
      tags: [saleOrders]
      summary: Create a new sale order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleOrderInput"
      responses:
        "201":
          description: Sale order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleOrder"

  /sale-orders/{id}:
    get:
      operationId: getSaleOrder
      tags: [saleOrders]
      summary: Get a sale order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleOrder"
    patch:
      operationId: updateSaleOrder
      tags: [saleOrders]
      summary: Update a sale order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleOrder"
    delete:
      operationId: deleteSaleOrder
      tags: [saleOrders]
      summary: Delete a sale order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── PAYMENTS ──────────────────────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List all payments
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [cash, bank]
      responses:
        "200":
          description: Payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a new payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get a payment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    patch:
      operationId: updatePayment
      tags: [payments]
      summary: Update a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── REPORTS ───────────────────────────────────────────────────────────────
  /reports/aging:
    get:
      operationId: getAgingReport
      tags: [reports]
      summary: Aging report — who owes how much for how long
      responses:
        "200":
          description: Aging data per customer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgingRow"

  /reports/daily-collection:
    get:
      operationId: getDailyCollectionReport
      tags: [reports]
      summary: Daily collection summary
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyCollectionReport"

  /reports/monthly-sales:
    get:
      operationId: getMonthlySalesReport
      tags: [reports]
      summary: Monthly sales by product
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly sales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySalesReport"

  /reports/outstanding:
    get:
      operationId: getOutstandingReport
      tags: [reports]
      summary: Customer-wise outstanding list
      responses:
        "200":
          description: Outstanding list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutstandingRow"

  # ── DASHBOARD ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard at-a-glance numbers
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/top-debtors:
    get:
      operationId: getTopDebtors
      tags: [dashboard]
      summary: Top debtors list
      responses:
        "200":
          description: Top debtors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtorRow"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent transactions (sales + payments)
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── SUPPLIERS ─────────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers with payable balance
      responses:
        "200":
          description: Supplier list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierRow"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierRow"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier with ledger (purchases + balance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDetail"
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierRow"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── PURCHASES ─────────────────────────────────────────────────────────────
  /purchases:
    get:
      operationId: listPurchases
      tags: [suppliers]
      summary: List purchase invoices
      parameters:
        - name: supplierId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Purchase list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseInvoiceRow"
    post:
      operationId: createPurchase
      tags: [suppliers]
      summary: Create a purchase invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseInvoiceRow"

  /purchases/{id}:
    get:
      operationId: getPurchase
      tags: [suppliers]
      summary: Get purchase invoice with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseInvoiceDetail"
    delete:
      operationId: deletePurchase
      tags: [suppliers]
      summary: Delete a purchase invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CASHBOOK ──────────────────────────────────────────────────────────────
  /cashbook:
    get:
      operationId: listCashbookEntries
      tags: [cashbook]
      summary: List cashbook entries with running balance
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [cash_in, cash_out]
        - name: paymentMode
          in: query
          schema:
            type: string
            enum: [cash, bank, easypaisa, jazzcash, cheque, other]
      responses:
        "200":
          description: Cashbook entries with running balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashbookLedger"
    post:
      operationId: createCashbookEntry
      tags: [cashbook]
      summary: Create a manual cashbook entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashbookEntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashbookEntry"

  /cashbook/summary:
    get:
      operationId: getCashbookSummary
      tags: [cashbook]
      summary: Get cash & bank balances summary
      responses:
        "200":
          description: Balance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashbookSummary"

  /cashbook/{id}:
    delete:
      operationId: deleteCashbookEntry
      tags: [cashbook]
      summary: Delete a manual cashbook entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── EXPENSES ──────────────────────────────────────────────────────────────
  /expenses:
    get:
      operationId: listExpenses
      tags: [cashbook]
      summary: List expenses
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Expense list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [cashbook]
      summary: Record an expense (auto-posts to cashbook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Expense recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    delete:
      operationId: deleteExpense
      tags: [cashbook]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH ──────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, name, username, role]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [owner, salesman, cashier]

    User:
      type: object
      required: [id, name, username, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [owner, salesman, cashier]
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name, username, password, role]
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [owner, salesman, cashier]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [owner, salesman, cashier]

    # ── CUSTOMERS ──────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, openingBalance, balance, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        ntn:
          type: ["string", "null"]
        area:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        contact:
          type: ["string", "null"]
        creditLimit:
          type: ["number", "null"]
        openingBalance:
          type: number
        openingBalanceDate:
          type: ["string", "null"]
          format: date
        balance:
          type: number
        createdAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [name]
